<!DOCTYPE html>
<html lang="pt-BR">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#0a0a0a" />

		<meta name="description" content="Voltz Cenografia — Criamos experiências memoráveis." />

		<!-- Open Graph -->
		<meta property="og:title" content="Voltz Cenografia" />
		<meta property="og:description" content="Vamos criar algo memorável juntos?" />
		<meta property="og:type" content="website" />
		<meta property="og:locale" content="pt_BR" />
		<meta property="og:url" content="https://site-voltz.vercel.app/" />
		<meta property="og:image" content="https://site-voltz.vercel.app/og-image.png" />
		<meta property="og:image:type" content="image/png" />

		<!-- WhatsApp / Twitter -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:image" content="https://site-voltz.vercel.app/og-image.png" />

		<!-- Favicon placeholder (substituir depois) -->
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />

		%sveltekit.head%

		<link rel="preload" href="/fonts/Montserrat/Montserrat-VariableFont_wght.ttf" as="font" type="font/ttf" crossorigin />
		<link rel="preload" href="/fonts/Kodchasan/Kodchasan-Regular.ttf" as="font" type="font/ttf" crossorigin />
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
